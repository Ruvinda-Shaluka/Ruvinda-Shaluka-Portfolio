<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  
  <!-- Outer Tech Octagon / Shield -->
  <path d="M 60 20 H 140 L 180 60 V 140 L 140 180 H 60 L 20 140 V 60 Z" 
        stroke="url(#logo-grad)" stroke-width="8" stroke-linejoin="round" opacity="0.2" />

  <!-- Outer Tech Accents -->
  <path d="M 40 25 L 25 40 V 60" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round" />
  <path d="M 160 175 L 175 160 V 140" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round" />

  <!-- Monogram R -->
  <path d="M 55 145 V 55 H 105 C 125 55, 125 95, 105 95 H 55 M 95 95 L 130 145" 
        stroke="url(#logo-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Monogram S (flows from/behind R) -->
  <path d="M 145 70 C 145 55, 120 50, 115 65 C 110 80, 140 85, 140 105 C 140 125, 115 130, 105 115" 
        stroke="url(#logo-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
</svg>
